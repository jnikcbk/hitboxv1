<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cussa Web App</title>
    <style>
        :root { --bg: #0a0a0a; --card: #171717; --primary: #0070f3; --text: #ededed; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: var(--card); padding: 2rem; border-radius: 12px; border: 1px solid #333; width: 350px; box-shadow: 0 8px 30px rgba(0,0,0,0.5); }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; color: var(--primary); }
        .input-group { display: flex; gap: 8px; margin-bottom: 20px; }
        input { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #333; background: #000; color: white; outline: none; }
        input:focus { border-color: var(--primary); }
        button { padding: 10px 15px; background: var(--primary); border: none; border-radius: 6px; color: white; cursor: pointer; font-weight: 600; transition: 0.2s; }
        button:hover { opacity: 0.8; }
        ul { list-style: none; padding: 0; margin: 0; }
        li { background: #222; margin-bottom: 8px; padding: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .del-btn { background: #ff4444; padding: 5px 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <h1>Cussa App 🚀</h1>
    <div class="input-group">
        <input type="text" id="taskInput" placeholder="Nhập nội dung...">
        <button onclick="addTask()">Thêm</button>
    </div>
    <ul id="taskList"></ul>
</div>

<script>
    const taskInput = document.getElementById('taskInput');
    const taskList = document.getElementById('taskList');

    // Load dữ liệu cũ từ bộ nhớ trình duyệt khi mở web
    document.addEventListener('DOMContentLoaded', getTasks);

    function addTask() {
        if (taskInput.value === "") return;
        createTaskElement(taskInput.value);
        saveLocal(taskInput.value);
        taskInput.value = "";
    }

    function createTaskElement(text) {
        const li = document.createElement('li');
        li.innerHTML = `${text} <button class="del-btn" onclick="removeTask(this)">Xóa</button>`;
        taskList.appendChild(li);
    }

    function saveLocal(task) {
        let tasks = localStorage.getItem('tasks') ? JSON.parse(localStorage.getItem('tasks')) : [];
        tasks.push(task);
        localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function getTasks() {
        let tasks = localStorage.getItem('tasks') ? JSON.parse(localStorage.getItem('tasks')) : [];
        tasks.forEach(task => createTaskElement(task));
    }

    function removeTask(btn) {
        const text = btn.parentElement.innerText.replace('Xóa', '').trim();
        let tasks = JSON.parse(localStorage.getItem('tasks'));
        tasks = tasks.filter(t => t !== text);
        localStorage.setItem('tasks', JSON.stringify(tasks));
        btn.parentElement.remove();
    }

    taskInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') addTask(); });
</script>

</body>
</html>
