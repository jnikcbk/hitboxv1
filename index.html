<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS To-Do Vercel</title>
    
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --text: #f8fafc;
            --primary: #38bdf8;
        }
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }
        .container {
            background: var(--card);
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
        input {
            padding: 10px;
            border-radius: 5px;
            border: none;
            width: 70%;
            margin-bottom: 10px;
        }
        button {
            padding: 10px 20px;
            background: var(--primary);
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        ul {
            list-style: none;
            padding: 0;
            text-align: left;
        }
        li {
            background: #334155;
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
        }
        #clock {
            font-size: 2rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }
    </style>
</head>
<body>

    <div id="clock">00:00:00</div>

    <div class="container">
        <h2>Danh sách việc cần làm</h2>
        <input type="text" id="taskInput" placeholder="Nhập việc cần làm...">
        <button onclick="addTask()">Thêm</button>
        <ul id="taskList"></ul>
    </div>

    <script>
        // 1. Cập nhật đồng hồ thời gian thực
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. Xử lý thêm công việc
        function addTask() {
            const input = document.getElementById('taskInput');
            const taskText = input.value.trim();
            
            if (taskText === "") {
                alert("Vui lòng không để trống!");
                return;
            }

            const li = document.createElement('li');
            li.innerHTML = `
                <span>${taskText}</span>
                <button onclick="this.parentElement.remove()" style="background: #ef4444; padding: 2px 8px;">Xóa</button>
            `;
            
            document.getElementById('taskList').appendChild(li);
            input.value = ""; // Xóa ô nhập sau khi thêm
        }

        // Nhấn Enter để thêm cho tiện
        document.getElementById('taskInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') addTask();
        });
    </script>
</body>
</html>
