<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cussa Zen Garden</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; touch-action: none; }
        canvas { display: block; filter: blur(5px) contrast(20); } /* Hiệu ứng tạo cảm giác chất lỏng hòa quyện */
        #hint { position: absolute; top: 20px; width: 100%; text-align: center; color: #444; font-family: sans-serif; pointer-events: none; letter-spacing: 2px; }
    </style>
</head>
<body>

    <div id="hint">CHẠM VÀ LẮC ĐỂ TRẢI NGHIỆM</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let balls = [];
        const gravity = { x: 0, y: 0.5 };
        const mouse = { x: -1000, y: -1000, active: false };

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            balls = [];
            // Tạo 150 viên ngọc
            for(let i = 0; i < 150; i++) {
                balls.push({
                    x: Math.random() * width,
                    y: Math.random() * height,
                    vx: 0,
                    vy: 0,
                    r: Math.random() * 15 + 10,
                    color: `hsl(${Math.random() * 40 + 180}, 80%, 50%)`
                });
            }
        }

        // Theo dõi trọng lực điện thoại (Nếu có)
        window.addEventListener('devicemotion', (e) => {
            gravity.x = e.accelerationIncludingGravity.x * 0.1;
            gravity.y = -e.accelerationIncludingGravity.y * 0.1;
        });

        window.addEventListener('mousemove', e => { mouse.x = e.x; mouse.y = e.y; });
        window.addEventListener('mousedown', () => mouse.active = true);
        window.addEventListener('mouseup', () => mouse.active = false);

        function animate() {
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, width, height);

            balls.forEach(b => {
                // Áp dụng trọng lực
                b.vx += gravity.x;
                b.vy += gravity.y;
                
                // Tương tác với chuột (Đẩy ra)
                const dx = b.x - mouse.x;
                const dy = b.y - mouse.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if(dist < 100) {
                    b.vx += dx * 0.05;
                    b.vy += dy * 0.05;
                }

                b.x += b.vx;
                b.y += b.vy;

                // Ma sát
                b.vx *= 0.98;
                b.vy *= 0.98;

                // Va chạm tường
                if(b.x + b.r > width) { b.x = width - b.r; b.vx *= -0.5; }
                if(b.x - b.r < 0) { b.x = b.r; b.vx *= -0.5; }
                if(b.y + b.r > height) { b.y = height - b.r; b.vy *= -0.5; }
                if(b.y - b.r < 0) { b.y = b.r; b.vy *= -0.5; }

                // Vẽ
                ctx.fillStyle = b.color;
                ctx.beginPath();
                ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
                ctx.fill();
            });

            requestAnimationFrame(animate);
        }

        init();
        animate();
        window.addEventListener('resize', init);
    </script>
</body>
</html>
