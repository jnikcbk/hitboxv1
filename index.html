<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAIZEN | ELITE PORTFOLIO</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        body {
            background: #050505;
            color: #e2e8f0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* Hiệu ứng hạt bụi bay lờ lững */
        .bg-animate {
            background: radial-gradient(circle at 50% 50%, #1e1b4b 0%, #000 100%);
        }
        .glow-card:hover {
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.4);
            transform: translateY(-5px);
        }
    </style>
</head>
<body class="bg-animate min-h-screen flex items-center justify-center p-6">

    <div class="relative w-full max-w-2xl">
        <div class="absolute -top-20 -left-20 w-64 h-64 bg-blue-600 rounded-full blur-[120px] opacity-20"></div>
        <div class="absolute -bottom-20 -right-20 w-64 h-64 bg-purple-600 rounded-full blur-[120px] opacity-20"></div>

        <div class="relative z-10 bg-white/5 backdrop-blur-2xl border border-white/10 rounded-[2.5rem] p-10 text-center shadow-2xl">
            
            <div class="mx-auto w-32 h-32 rounded-full border-4 border-blue-500 p-1 mb-6 shadow-[0_0_20px_rgba(59,130,246,0.5)]">
                <img src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Kaizen" class="rounded-full bg-zinc-800" alt="Avatar">
            </div>

            <h1 class="text-4xl font-black tracking-tighter text-white mb-2 uppercase italic">Kaizen User</h1>
            <p class="text-blue-400 font-mono text-sm tracking-widest mb-8 uppercase">Hacker • Developer • Designer</p>

            <div class="space-y-4">
                <a href="#" class="glow-card block w-full py-4 bg-white/5 border border-white/10 rounded-2xl font-bold tracking-widest hover:bg-white hover:text-black transition-all duration-300">
                    FACEBOOK
                </a>
                <a href="#" class="glow-card block w-full py-4 bg-white/5 border border-white/10 rounded-2xl font-bold tracking-widest hover:bg-blue-500 hover:text-white transition-all duration-300">
                    DISCORD SERVER
                </a>
                <a href="#" class="glow-card block w-full py-4 bg-white/5 border border-white/10 rounded-2xl font-bold tracking-widest hover:bg-red-500 hover:text-white transition-all duration-300">
                    YOUTUBE CHANNEL
                </a>
            </div>

            <div class="mt-12 overflow-hidden whitespace-nowrap">
                <p class="inline-block animate-[pulse_2s_infinite] text-[10px] text-zinc-500 font-mono tracking-[0.5em] uppercase">
                    System active • Security encrypted • Welcome to my world
                </p>
            </div>
        </div>
    </div>

</body>
</html>
