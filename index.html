<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cussa Music - Studio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --bg-dark: #090909; --bg-card: #181818; --primary: #1db954; --text-dim: #b3b3b3; }
        body { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar */
        .sidebar { width: 240px; background: black; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .logo { font-size: 1.5rem; font-weight: bold; color: var(--primary); margin-bottom: 20px; }
        .nav-item { color: var(--text-dim); cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
        .nav-item:hover { color: white; }

        /* Main Content */
        .main { flex: 1; background: linear-gradient(to bottom, #222, var(--bg-dark)); overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .search-bar { width: 100%; max-width: 400px; background: white; border-radius: 50px; padding: 10px 20px; display: flex; align-items: center; margin-bottom: 30px; }
        .search-bar input { border: none; outline: none; width: 100%; margin-left: 10px; font-size: 1rem; }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .card { background: var(--bg-card); padding: 15px; border-radius: 8px; transition: 0.3s; cursor: pointer; position: relative; }
        .card:hover { background: #282828; }
        .card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 6px; margin-bottom: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        .card h4 { margin: 0; font-size: 1rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card p { color: var(--text-dim); font-size: 0.8rem; margin: 5px 0; }
        .play-btn { position: absolute; right: 20px; bottom: 60px; background: var(--primary); color: black; width: 45px; height: 45px; border-radius: 50%; display: flex; align-items: center; justify-content: center; opacity: 0; transform: translateY(10px); transition: 0.3s; box-shadow: 0 8px 15px rgba(0,0,0,0.3); }
        .card:hover .play-btn { opacity: 1; transform: translateY(0); }

        /* Player Bar */
        .player-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 90px; background: #000; border-top: 1px solid #282828; display: flex; align-items: center; padding: 0 20px; box-sizing: border-box; z-index: 100; }
        .now-playing { width: 30%; display: flex; align-items: center; gap: 15px; }
        .now-playing img { width: 56px; height: 56px; border-radius: 4px; }
        .controls { flex: 1; display: flex; flex-direction: column; align-items: center; }
        #video-frame { position: absolute; opacity: 0; pointer-events: none; width: 1px; height: 1px; } /* Ẩn video nhưng vẫn phát tiếng */
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="logo">CUSSA MUSIC</div>
        <div class="nav-item"><i class="fas fa-home"></i> Trang chủ</div>
        <div class="nav-item"><i class="fas fa-search"></i> Khám phá</div>
        <div class="nav-item"><i class="fas fa-book"></i> Thư viện</div>
    </div>

    <div class="main">
        <div class="search-bar">
            <i class="fas fa-search" style="color: #333;"></i>
            <input type="text" id="searchInput" placeholder="Bạn muốn nghe gì?">
        </div>

        <h2 id="sectionTitle">Bài hát gợi ý</h2>
        <div class="grid" id="musicGrid">
            </div>
    </div>

    <div class="player-bar">
        <div class="now-playing">
            <img id="currentThumb" src="https://via.placeholder.com/56" alt="">
            <div>
                <h4 id="currentTitle" style="margin: 0; font-size: 0.9rem;">Chưa có bài hát</h4>
                <p id="currentArtist" style="margin: 0; font-size: 0.7rem; color: var(--text-dim);">Chọn một bài để phát</p>
            </div>
        </div>
        <div class="controls">
             <div id="playerContent" style="width: 100%; height: 60px; overflow: hidden; border-radius: 8px;">
                 <div id="youtubePlayer"></div>
             </div>
        </div>
    </div>

    <script>
        // Dữ liệu mẫu ban đầu (Có thể thay bằng gọi API thật)
        const defaultSongs = [
            { id: "L0X7A255YTo", title: "Lạc Trôi", artist: "Sơn Tùng M-TP" },
            { id: "H2uIDGfWAsU", title: "Waiting For You", artist: "MONO" },
            { id: "3X9pTevZ1S0", title: "Em Đồng Ý", artist: "Đức Phúc" },
            { id: "knW7-x7Y7RE", title: "See Tình", artist: "Hoàng Thùy Linh" }
        ];

        const grid = document.getElementById('musicGrid');
        const searchInput = document.getElementById('searchInput');

        // Hàm render bài hát lên màn hình
        function renderSongs(songs) {
            grid.innerHTML = songs.map(song => `
                <div class="card" onclick="playMusic('${song.id}', '${song.title}', '${song.artist}')">
                    <img src="https://img.youtube.com/vi/${song.id}/mqdefault.jpg" alt="">
                    <h4>${song.title}</h4>
                    <p>${song.artist}</p>
                    <div class="play-btn"><i class="fas fa-play"></i></div>
                </div>
            `).join('');
        }

        // Hàm phát nhạc
        function playMusic(id, title, artist) {
            document.getElementById('currentTitle').innerText = title;
            document.getElementById('currentArtist').innerText = artist;
            document.getElementById('currentThumb').src = `https://img.youtube.com/vi/${id}/mqdefault.jpg`;
            
            // Nhúng trình phát YouTube Mini
            const playerDiv = document.getElementById('youtubePlayer');
            playerDiv.innerHTML = `<iframe width="100%" height="60" src="https://www.youtube.com/embed/${id}?autoplay=1" frameborder="0" allow="autoplay"></iframe>`;
        }

        // Xử lý tìm kiếm (Giả lập tìm kiếm nhanh)
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                const query = searchInput.value;
                alert("Đang tìm: " + query + "\n(Tính năng này cần API Key của YouTube để hoạt động thật 100%)");
                // Trong thực tế, bạn sẽ gọi: fetch(`https://www.googleapis.com/youtube/v3/search?q=${query}...`)
            }
        });

        // Chạy lần đầu
        renderSongs(defaultSongs);
    </script>
</body>
</html>
