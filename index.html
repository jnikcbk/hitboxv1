<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cussa Brain Master</title>
    <style>
        :root { --primary: #00d2ff; --bg: #0f172a; --card: #1e293b; --success: #10b981; --error: #ef4444; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        
        .container { background: var(--card); padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 350px; text-align: center; border: 1px solid #334155; }
        h1 { font-size: 1.5rem; color: var(--primary); margin-bottom: 20px; }
        
        .stats { display: flex; justify-content: space-between; margin-bottom: 20px; font-weight: bold; font-size: 0.9rem; color: #94a3b8; }
        
        #question { font-size: 3rem; font-weight: 800; margin: 20px 0; letter-spacing: 2px; }
        
        input { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid #334155; background: #0f172a; color: white; font-size: 1.5rem; text-align: center; outline: none; box-sizing: border-box; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }
        
        .progress-bar { height: 6px; background: #334155; border-radius: 3px; margin-top: 25px; overflow: hidden; }
        #progress { height: 100%; background: var(--primary); width: 100%; transition: linear; }

        .game-over { display: none; }
        button { background: var(--primary); color: #0f172a; border: none; padding: 12px 25px; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>

    <div class="container" id="game-container">
        <div class="stats">
            <span>SCORE: <span id="score">0</span></span>
            <span>HIGH: <span id="high-score">0</span></span>
        </div>
        
        <h1>BRAIN MASTER</h1>
        
        <div id="game-ui">
            <div id="question">12 + 8</div>
            <input type="number" id="answer" placeholder="?" autofocus autocomplete="off">
            <div class="progress-bar">
                <div id="progress"></div>
            </div>
        </div>

        <div id="result-ui" class="game-over">
            <h2 style="color: var(--error);">GAME OVER</h2>
            <p id="final-stats"></p>
            <button onclick="startGame()">THỬ LẠI</button>
        </div>
    </div>

    <script>
        let score = 0;
        let timeLeft = 100;
        let timerId;
        let correctAnswer;
        let highScore = localStorage.getItem('cussa_high_score') || 0;
        
        document.getElementById('high-score').innerText = highScore;
        const answerInput = document.getElementById('answer');

        function generateQuestion() {
            const operators = ['+', '-', '*'];
            const op = operators[Math.floor(Math.random() * operators.length)];
            let n1, n2;

            if (op === '*') {
                n1 = Math.floor(Math.random() * 12) + 2;
                n2 = Math.floor(Math.random() * 12) + 2;
            } else {
                n1 = Math.floor(Math.random() * 50) + 1;
                n2 = Math.floor(Math.random() * 50) + 1;
            }

            document.getElementById('question').innerText = `${n1} ${op} ${n2}`;
            correctAnswer = eval(`${n1} ${op} ${n2}`);
        }

        function startGame() {
            score = 0;
            timeLeft = 100;
            document.getElementById('score').innerText = score;
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('result-ui').style.display = 'none';
            answerInput.value = '';
            answerInput.focus();
            generateQuestion();
            resetTimer();
        }

        function resetTimer() {
            clearInterval(timerId);
            timeLeft = 100;
            timerId = setInterval(() => {
                timeLeft -= 1.5; // Tốc độ giảm thanh thời gian
                document.getElementById('progress').style.width = timeLeft + '%';
                if (timeLeft <= 0) endGame();
            }, 100);
        }

        function endGame() {
            clearInterval(timerId);
            document.getElementById('game-ui').style.display = 'none';
            document.getElementById('result-ui').style.display = 'block';
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('cussa_high_score', highScore);
                document.getElementById('high-score').innerText = highScore;
            }

            // Công thức tính độ nhạy não bộ: A = accuracy
            const accuracy = score > 0 ? Math.round((score / (score + 1)) * 100) : 0;
            document.getElementById('final-stats').innerHTML = `Điểm của bạn: ${score}<br>Độ nhạy não bộ: $S = ${accuracy}\\%$`;
        }

        answerInput.addEventListener('input', () => {
            if (parseInt(answerInput.value) === correctAnswer) {
                score++;
                document.getElementById('score').innerText = score;
                answerInput.value = '';
                generateQuestion();
                resetTimer(); // Reset thời gian khi trả lời đúng
            }
        });

        startGame();
    </script>
</body>
</html>
