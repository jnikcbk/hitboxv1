<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaizen Music - Nhạc Của Tâm</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', Courier, monospace;
        }
        /* Hiệu ứng hào quang xanh */
        .glow-box {
            box-shadow: 0 0 50px rgba(59, 130, 246, 0.2);
            border: 1px solid rgba(59, 130, 246, 0.3);
        }
        /* Hiệu ứng sóng nhạc giả lập */
        .bar {
            width: 4px;
            background: #3b82f6;
            margin: 0 2px;
            border-radius: 10px;
            animation: bounce 1s ease-in-out infinite;
        }
        @keyframes bounce {
            0%, 100% { height: 10px; }
            50% { height: 40px; }
        }
    </style>
</head>
<body>

    <div class="glow-box bg-zinc-950 p-8 rounded-3xl w-full max-w-lg text-center">
        <div class="mb-6">
            <h1 class="text-blue-500 font-black text-2xl tracking-tighter italic uppercase">Detective Audio Log</h1>
            <p class="text-zinc-500 text-[10px] tracking-[0.3em] mt-1">DECODING: NHẠC CỦA TÂM VOL 6</p>
        </div>

        <div class="flex items-center justify-center h-12 mb-6">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.5s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
            <div class="bar" style="animation-delay: 0.6s"></div>
        </div>

        <div class="rounded-2xl overflow-hidden border border-white/10 bg-black shadow-inner">
            <iframe 
                width="100%" 
                height="300" 
                scrolling="no" 
                frameborder="no" 
                allow="autoplay" 
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/playlists/1785532599&color=%233b82f6&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true&visual=true">
            </iframe>
        </div>

        <div class="mt-6 text-zinc-600 text-[10px] uppercase font-bold">
            <p>> Link Source: SoundCloud/H-ng-ph-c</p>
            <p class="text-blue-900 mt-2 italic">Dán code này vào là chạy - Không ra nhạc Nga!</p>
        </div>
    </div>

</body>
</html>
