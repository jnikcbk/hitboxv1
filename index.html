<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cussa Music Player</title>
    <style>
        :root { --p: #ff0077; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; overflow: hidden; }
        
        .player-card { background: #111; padding: 30px; border-radius: 20px; border: 1px solid #222; text-align: center; width: 300px; position: relative; z-index: 10; }
        
        .disk { width: 150px; height: 150px; background: linear-gradient(45deg, #333, #000); border-radius: 50%; margin: 0 auto 20px; border: 5px solid var(--p); animation: rotate 5s linear infinite paused; }
        .disk.playing { animation-play-state: running; }
        
        @keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        h2 { margin: 10px 0; font-size: 1.2rem; }
        p { color: #888; font-size: 0.9rem; }

        .controls { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        button { background: none; border: 2px solid white; color: white; padding: 10px 20px; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        button:hover { background: white; color: black; }
        
        /* Hiệu ứng sóng nhạc giả lập */
        .visualizer { display: flex; justify-content: center; gap: 3px; height: 30px; margin-top: 20px; }
        .bar { width: 4px; background: var(--p); border-radius: 2px; animation: bounce 1s ease-in-out infinite alternate paused; }
        .playing .bar { animation-play-state: running; }

        @keyframes bounce { from { height: 5px; } to { height: 30px; } }
    </style>
</head>
<body>

    <div class="player-card" id="player">
        <div class="disk" id="disk"></div>
        <h2>Đang phát: Lofi Chill</h2>
        <p>Cussa Studio - 2024</p>

        <div class="visualizer">
            <div class="bar" style="animation-delay: 0.1s"></div>
            <div class="bar" style="animation-delay: 0.3s"></div>
            <div class="bar" style="animation-delay: 0.2s"></div>
            <div class="bar" style="animation-delay: 0.4s"></div>
            <div class="bar" style="animation-delay: 0.1s"></div>
        </div>

        <div class="controls">
            <button id="playBtn">PLAY</button>
        </div>
        
        <audio id="audio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>
    </div>

    <script>
        const audio = document.getElementById('audio');
        const playBtn = document.getElementById('playBtn');
        const disk = document.getElementById('disk');
        const player = document.getElementById('player');
        let isPlaying = false;

        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                audio.pause();
                playBtn.innerText = "PLAY";
                disk.classList.remove('playing');
                player.classList.remove('playing');
            } else {
                audio.play();
                playBtn.innerText = "PAUSE";
                disk.classList.add('playing');
                player.classList.add('playing');
            }
            isPlaying = !isPlaying;
        });
    </script>
</body>
</html>
