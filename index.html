<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cussa Cyber Terminal</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root { --neon: #00ff41; --bg: #000800; }
        body { background: var(--bg); color: var(--neon); font-family: 'Share Tech Mono', monospace; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }

        .terminal { border: 1px solid var(--neon); padding: 40px; background: rgba(0, 20, 0, 0.9); box-shadow: 0 0 20px rgba(0, 255, 65, 0.2); position: relative; }
        .terminal::before { content: "SYSTEM_MONITOR_V2.0"; position: absolute; top: -10px; left: 20px; background: var(--bg); padding: 0 10px; font-size: 12px; }

        .time { font-size: 6rem; text-shadow: 0 0 15px var(--neon); margin-bottom: 20px; }
        .date { font-size: 1.5rem; opacity: 0.7; border-bottom: 1px solid var(--neon); padding-bottom: 10px; margin-bottom: 20px; }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 14px; }
        .stat-item { display: flex; justify-content: space-between; }
        .loading-bar { width: 100px; height: 10px; border: 1px solid var(--neon); position: relative; }
        .progress { height: 100%; background: var(--neon); width: 0%; transition: width 0.5s; }

        .scan-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: rgba(0, 255, 65, 0.1); animation: scan 4s linear infinite; pointer-events: none; }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
    </style>
</head>
<body>

    <div class="scan-line"></div>

    <div class="terminal">
        <div class="date" id="date">INITIATING...</div>
        <div class="time" id="time">00:00:00</div>
        
        <div class="stats">
            <div class="stat-item"><span>CPU_LOAD:</span> <div class="loading-bar"><div class="progress" id="cpu"></div></div></div>
            <div class="stat-item"><span>MEMORY:</span> <div class="loading-bar"><div class="progress" id="ram"></div></div></div>
            <div class="stat-item"><span>IP_ADDR:</span> <span id="ip">192.168.1.XXX</span></div>
            <div class="stat-item"><span>STATUS:</span> <span style="animation: blink 1s infinite">ONLINE</span></div>
        </div>
    </div>

    <script>
        function update() {
            const now = new Date();
            
            // Cập nhật giờ
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('time').innerText = `${h}:${m}:${s}`;

            // Cập nhật ngày
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('date').innerText = now.toLocaleDateString('vi-VN', options).toUpperCase();

            // Giả lập thanh chạy
            document.getElementById('cpu').style.width = Math.random() * 100 + "%";
            document.getElementById('ram').style.width = Math.random() * 100 + "%";
        }

        // Tạo hiệu ứng chớp tắt cho chữ Online
        const style = document.createElement('style');
        style.innerHTML = "@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }";
        document.head.appendChild(style);

        setInterval(update, 1000);
        update();
    </script>
</body>
</html>
