<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cussa Identity Scanner</title>
    <style>
        :root { --neon: #bc13fe; --cyan: #05ffa1; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Courier New', Courier, monospace; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }

        .scanner-container { position: relative; width: 250px; height: 350px; border: 2px solid var(--neon); border-radius: 20px; display: flex; align-items: center; justify-content: center; background: rgba(188, 19, 254, 0.05); cursor: pointer; transition: 0.3s; box-shadow: 0 0 15px var(--neon); }

        /* Hiệu ứng quét laser */
        .laser { position: absolute; width: 100%; height: 3px; background: var(--cyan); top: 0; left: 0; box-shadow: 0 0 15px var(--cyan); display: none; z-index: 5; }
        .scanning .laser { display: block; animation: scanMove 2s infinite ease-in-out; }

        @keyframes scanMove { 0% { top: 0; } 50% { top: 100%; } 100% { top: 0; } }

        /* Icon vân tay */
        .fingerprint { font-size: 80px; opacity: 0.5; transition: 0.5s; }
        .scanning .fingerprint { opacity: 1; color: var(--cyan); transform: scale(1.1); }

        /* Kết quả */
        #status { margin-top: 30px; font-size: 1.2rem; font-weight: bold; letter-spacing: 2px; text-align: center; height: 30px; }
        #result { margin-top: 10px; font-size: 2rem; color: var(--cyan); text-shadow: 0 0 10px var(--cyan); display: none; text-transform: uppercase; }

        .info { position: absolute; top: 10px; left: 10px; font-size: 10px; color: var(--neon); opacity: 0.7; }
    </style>
</head>
<body>

    <div class="info">SYSTEM v4.0 // BIOMETRIC_AUTH // cussa.vercel.app</div>

    <div id="status">NHẤN GIỮ ĐỂ QUÉT</div>

    <div class="scanner-container" id="scanner" onmousedown="startScan()" onmouseup="stopScan()" ontouchstart="startScan()" ontouchend="stopScan()">
        <div class="laser"></div>
        <div class="fingerprint">🖐️</div>
    </div>

    <div id="result">ĐANG PHÂN TÍCH...</div>

    <script>
        let scanTimer;
        const statusText = document.getElementById('status');
        const resultText = document.getElementById('result');
        const scanner = document.getElementById('scanner');

        const outcomes = [
            "THUẦN CHỦNG 100%", 
            "GAY NGẦM (88%)", 
            "CHUẨN MEN", 
            "GAY CHÍNH HIỆU", 
            "BÊ ĐÊ QUỐC TẾ", 
            "SIÊU CẤP ĐẸP TRAI",
            "CỨNG NHƯ THÉP"
        ];

        function startScan() {
            resultText.style.display = 'none';
            statusText.innerText = "ĐANG TRUY XUẤT DỮ LIỆU...";
            scanner.classList.add('scanning');

            scanTimer = setTimeout(() => {
                showResult();
            }, 3000); // Quét trong 3 giây
        }

        function stopScan() {
            if (scanner.classList.contains('scanning')) {
                clearTimeout(scanTimer);
                scanner.classList.remove('scanning');
                statusText.innerText = "QUÉT THẤT BẠI! NHẤN GIỮ LẠI";
            }
        }

        function showResult() {
            scanner.classList.remove('scanning');
            statusText.innerText = "PHÂN TÍCH HOÀN TẤT:";
            const randomResult = outcomes[Math.floor(Math.random() * outcomes.length)];
            resultText.innerText = randomResult;
            resultText.style.display = 'block';
            
            // Đổi màu kết quả nếu là "Gay"
            if(randomResult.includes("GAY") || randomResult.includes("BÊ ĐÊ")) {
                resultText.style.color = "#ff0077";
                resultText.style.textShadow = "0 0 15px #ff0077";
            } else {
                resultText.style.color = "var(--cyan)";
                resultText.style.textShadow = "0 0 15px var(--cyan)";
            }
        }
    </script>
</body>
</html>
