<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cussa Multi-Player</title>
    <style>
        :root { --primary: #1DB954; --bg: #121212; --card: #181818; }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; margin: 0; }
        
        .container { width: 100%; max-width: 600px; text-align: center; }
        h1 { font-size: 2.5rem; margin-bottom: 10px; background: linear-gradient(to right, #1DB954, #00cdac); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .input-box { display: flex; gap: 10px; background: var(--card); padding: 10px; border-radius: 50px; border: 1px solid #333; margin-bottom: 30px; }
        input { flex: 1; background: transparent; border: none; color: white; padding: 5px 20px; outline: none; font-size: 1rem; }
        button { background: var(--primary); border: none; color: black; font-weight: bold; padding: 10px 25px; border-radius: 50px; cursor: pointer; transition: 0.3s; }
        button:hover { transform: scale(1.05); background: #1ed760; }

        #playerContainer { width: 100%; min-height: 200px; border-radius: 15px; overflow: hidden; background: var(--card); display: flex; align-items: center; justify-content: center; border: 1px dashed #444; }
        .platform-icons { display: flex; gap: 20px; margin-top: 20px; opacity: 0.5; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>CUSSA PLAYER</h1>
        <p style="color: #b3b3b3; margin-bottom: 20px;">Dán link YouTube, Spotify hoặc SoundCloud vào đây</p>

        <div class="input-box">
            <input type="text" id="urlInput" placeholder="https://youtube.com/watch?v=...">
            <button onclick="handlePlay()">PHÁT</button>
        </div>

        <div id="playerContainer">
            <span id="placeholderText">Chưa có nhạc được chọn</span>
        </div>

        <div class="platform-icons">
            <span>● YouTube</span>
            <span>● Spotify</span>
            <span>● SoundCloud</span>
        </div>
    </div>

    <script>
        function handlePlay() {
            const url = document.getElementById('urlInput').value.trim();
            const container = document.getElementById('playerContainer');
            
            if (!url) return alert("Vui lòng dán link!");

            let embedHtml = "";

            // Xử lý YouTube
            if (url.includes("youtube.com") || url.includes("youtu.be")) {
                let videoId = "";
                if (url.includes("v=")) videoId = url.split("v=")[1].split("&")[0];
                else videoId = url.split("/").pop();
                embedHtml = `<iframe width="100%" height="350" src="https://www.youtube.com/embed/${videoId}?autoplay=1" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>`;
            } 
            // Xử lý Spotify
            else if (url.includes("spotify.com")) {
                let spotifyPath = url.split("spotify.com/")[1].split("?")[0];
                embedHtml = `<iframe src="https://open.spotify.com/embed/${spotifyPath}" width="100%" height="350" frameborder="0" allowtransparency="true" allow="encrypted-media"></iframe>`;
            }
            // Xử lý SoundCloud
            else if (url.includes("soundcloud.com")) {
                embedHtml = `<iframe width="100%" height="350" scrolling="no" frameborder="no" allow="autoplay" src="https://w.soundcloud.com/player/?url=${encodeURIComponent(url)}&auto_play=true"></iframe>`;
            }
            else {
                alert("Nền tảng này hiện chưa hỗ trợ hoặc link sai định dạng!");
                return;
            }

            container.innerHTML = embedHtml;
        }

        // Nhấn Enter để phát luôn
        document.getElementById('urlInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handlePlay();
        });
    </script>
</body>
</html>
