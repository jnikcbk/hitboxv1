<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaizen Music - Nhạc Của Tâm</title>
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
        }

        /* Đĩa nhạc xoay */
        .vinyl-record {
            background: repeating-radial-gradient(#111, #111 2px, #222 3px, #111 4px);
            animation: spin 15s linear infinite;
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Hiệu ứng sóng nhạc giả lập */
        .wave-bar {
            @apply w-1 bg-cyan-500 rounded-full;
            animation: wave 1.2s ease-in-out infinite;
        }

        @keyframes wave {
            0%, 100% { height: 8px; }
            50% { height: 40px; }
        }
    </style>
</head>
<body class="flex items-center justify-center h-screen bg-neutral-950">

    <div class="fixed inset-0 bg-gradient-to-tr from-cyan-900/20 to-purple-900/20 opacity-40"></div>

    <div class="relative z-10 flex flex-col items-center">
        <div class="relative mb-10">
            <div class="vinyl-record w-64 h-64 rounded-full border-4 border-zinc-800 shadow-[0_0_50px_rgba(0,255,255,0.2)] flex items-center justify-center">
                <div class="w-20 h-20 rounded-full bg-white/10 backdrop-blur-md border border-white/20 flex items-center justify-center">
                    <div class="w-4 h-4 rounded-full bg-cyan-500 shadow-[0_0_10px_#06b6d4]"></div>
                </div>
            </div>
            <div class="absolute -top-4 -right-8 w-4 h-32 bg-zinc-700 origin-top rotate-[25deg] rounded-full border-l border-white/10"></div>
        </div>

        <div class="text-center mb-8">
            <h1 class="text-3xl font-black tracking-widest text-white uppercase italic">Nhạc Của Tâm</h1>
            <p class="text-cyan-400 text-sm mt-2 tracking-[0.5em]">VOL. 6 - DHD</p>
        </div>

        <div class="flex items-center gap-1 h-12 mb-8">
            <div class="wave-bar" style="animation-delay: 0.1s"></div>
            <div class="wave-bar" style="animation-delay: 0.3s"></div>
            <div class="wave-bar" style="animation-delay: 0.5s"></div>
            <div class="wave-bar" style="animation-delay: 0.2s"></div>
            <div class="wave-bar" style="animation-delay: 0.4s"></div>
            <div class="wave-bar" style="animation-delay: 0.6s"></div>
            <div class="wave-bar" style="animation-delay: 0.1s"></div>
            <div class="wave-bar" style="animation-delay: 0.3s"></div>
        </div>

        <div class="w-full max-w-md rounded-2xl overflow-hidden shadow-2xl border border-white/5">
            <iframe width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay" 
                src="https://w.soundcloud.com/player/?url=https%3A//api.soundcloud.com/tracks/1750242129&color=%2306b6d4&auto_play=false&hide_related=false&show_comments=true&show_user=true&show_reposts=false&show_teaser=true">
            </iframe>
        </div>
    </div>

</body>
</html>
