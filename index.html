<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cussa Second Brain</title>
    <style>
        :root { --bg: #050505; --card: #111; --primary: #7c3aed; --urgent: #ef4444; --important: #f59e0b; --text: #e5e7eb; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', system-ui, sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { font-size: 2.5rem; background: linear-gradient(to right, #7c3aed, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        
        /* Pomodoro Section */
        .focus-zone { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 30px; width: 100%; max-width: 400px; text-align: center; }
        #timer { font-size: 3.5rem; font-weight: bold; font-variant-numeric: tabular-nums; color: var(--primary); }
        
        /* Eisenhower Matrix */
        .matrix { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 100%; max-width: 900px; }
        .quadrant { background: var(--card); border-radius: 12px; padding: 15px; min-height: 200px; border: 1px solid #222; }
        .quadrant h3 { margin-top: 0; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; }
        .q1 { border-top: 4px solid var(--urgent); }    /* Quan trọng & Khẩn cấp */
        .q2 { border-top: 4px solid var(--important); } /* Quan trọng & Không khẩn cấp */
        .q3 { border-top: 4px solid #3b82f6; }          /* Không quan trọng & Khẩn cấp */
        .q4 { border-top: 4px solid #6b7280; }          /* Không quan trọng & Không khẩn cấp */

        .task-input { background: #1a1a1a; border: 1px solid #333; color: white; padding: 8px; border-radius: 5px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        ul { list-style: none; padding: 0; }
        li { background: #1a1a1a; margin-bottom: 5px; padding: 8px 12px; border-radius: 6px; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; }
        li button { background: none; border: none; color: #555; cursor: pointer; }
        li button:hover { color: #ef4444; }

        .stats { margin-top: 30px; color: #888; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="header">
        <h1>CUSSA BRAIN</h1>
        <p>Tối ưu hóa tư duy & Năng suất</p>
    </div>

    <div class="focus-zone">
        <div id="timer">25:00</div>
        <div style="margin-top: 10px;">
            <button onclick="startTimer()" style="background: var(--primary); color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">Bắt đầu tập trung</button>
            <button onclick="resetTimer()" style="background: transparent; color: #888; border: none; cursor: pointer;">Reset</button>
        </div>
    </div>

    <div class="matrix">
        <div class="quadrant q1">
            <h3 style="color: var(--urgent);">P1: Khẩn cấp & Quan trọng</h3>
            <input type="text" class="task-input" placeholder="+ Thêm việc cần làm ngay..." onkeypress="addTask(event, 'list1')">
            <ul id="list1"></ul>
        </div>
        <div class="quadrant q2">
            <h3 style="color: var(--important);">P2: Quan trọng (Lên lịch)</h3>
            <input type="text" class="task-input" placeholder="+ Thêm việc để phát triển bản thân..." onkeypress="addTask(event, 'list2')">
            <ul id="list2"></ul>
        </div>
        <div class="quadrant q3">
            <h3 style="color: #3b82f6;">P3: Khẩn cấp (Ủy quyền)</h3>
            <input type="text" class="task-input" placeholder="+ Thêm việc nhờ người khác..." onkeypress="addTask(event, 'list3')">
            <ul id="list3"></ul>
        </div>
        <div class="quadrant q4">
            <h3 style="color: #6b7280;">P4: Loại bỏ (Giải trí lướt web)</h3>
            <input type="text" class="task-input" placeholder="+ Thêm việc làm tốn thời gian..." onkeypress="addTask(event, 'list4')">
            <ul id="list4"></ul>
        </div>
    </div>

    <div class="stats" id="brainPower">
        Hiệu suất bộ não: $P_{brain} = 0\%$
    </div>

    <script>
        // --- LOGIC POMODORO ---
        let timeLeft = 25 * 60;
        let timerId = null;

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            document.getElementById('timer').innerText = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (timerId) return;
            timerId = setInterval(() => {
                timeLeft--;
                updateDisplay();
                if (timeLeft === 0) {
                    clearInterval(timerId);
                    alert("Đã hết thời gian tập trung! Nghỉ chút nhé.");
                }
            }, 1000);
        }

        function resetTimer() {
            clearInterval(timerId);
            timerId = null;
            timeLeft = 25 * 60;
            updateDisplay();
        }

        // --- LOGIC MA TRẬN ---
        function addTask(event, listId) {
            if (event.key === 'Enter' && event.target.value !== "") {
                const text = event.target.value;
                const li = document.createElement('li');
                li.innerHTML = `${text} <button onclick="this.parentElement.remove(); updateStats();">✕</button>`;
                document.getElementById(listId).appendChild(li);
                event.target.value = "";
                updateStats();
            }
        }

        function updateStats() {
            // Công thức giả định về hiệu suất: 
            // Hiệu suất tăng khi có nhiều task ở P1, P2 và ít task ở P4
            const q1 = document.getElementById('list1').children.length;
            const q2 = document.getElementById('list2').children.length;
            const q4 = document.getElementById('list4').children.length;
            
            const score = Math.max(0, (q1 * 10 + q2 * 15) - (q4 * 20));
            document.getElementById('brainPower').innerHTML = `Hiệu suất bộ não: $P_{brain} = ${score}\\%$`;
            
            // Vẽ lại công thức nếu có MathJax hoặc để text thuần
        }
    </script>
</body>
</html>
