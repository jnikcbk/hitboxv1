<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon 3D Adventure</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Press Start 2P', cursive; background: #000; }
        #ui { position: absolute; top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 15px; border-radius: 10px; z-index: 10; }
        #info { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); color: white; background: rgba(0,0,0,0.7); padding: 15px 30px; border-radius: 15px; font-size: 1.2rem; pointer-events: none; }
        #catchBtn { position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); background: #ff4757; color: white; border: none; padding: 15px 40px; font-size: 1.5rem; border-radius: 50px; cursor: pointer; box-shadow: 0 0 20px #ff6b81; z-index: 10; }
        #catchBtn:hover { background: #ff6b81; }
    </style>
</head>
<body>
    <div id="ui">
        <h1 class="text-2xl font-bold text-yellow-400">Pokémon 3D</h1>
        <p>Poké Ball: <span id="balls">10</span></p>
        <p>Điểm: <span id="score">0</span></p>
        <button onclick="spawnPokemon()" class="mt-4 bg-green-600 hover:bg-green-500 px-6 py-3 rounded-lg text-white">Tìm Pokémon Mới</button>
    </div>

    <div id="info" class="hidden"></div>
    <button id="catchBtn" class="hidden" onclick="tryCatch()">BẮT NGAY!</button>

    <script>
        // Three.js setup
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x87ceeb);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 15);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Ánh sáng
        const light = new THREE.DirectionalLight(0xffffff, 1);
        light.position.set(10, 10, 10);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0x404040));

        // Mặt đất
        const groundGeo = new THREE.PlaneGeometry(100, 100);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x228b22 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        scene.add(ground);

        // Pokémon hiện tại
        let currentPokemonMesh = null;
        let currentPokemonData = null;
        let balls = 10;
        let score = 0;

        const ballsEl = document.getElementById('balls');
        const scoreEl = document.getElementById('score');
        const infoEl = document.getElementById('info');
        const catchBtn = document.getElementById('catchBtn');

        function updateUI() {
            ballsEl.textContent = balls;
            scoreEl.textContent = score;
        }

        async function spawnPokemon() {
            if (balls <= 0) {
                alert("Hết Poké Ball rồi! Chơi lại sau nhé!");
                return;
            }

            // Random Pokémon từ 1 đến 898 (PokeAPI)
            const id = Math.floor(Math.random() * 898) + 1;
            const res = await fetch(`https://pokeapi.co/api/v2/pokemon/${id}`);
            const data = await res.json();

            currentPokemonData = data;

            // Xóa Pokémon cũ nếu có
            if (currentPokemonMesh) {
                scene.remove(currentPokemonMesh);
            }

            // Tạo plane 2D với texture sprite Pokémon
            const texture = new THREE.TextureLoader().load(data.sprites.front_default);
            const material = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
            const geometry = new THREE.PlaneGeometry(8, 8);
            currentPokemonMesh = new THREE.Mesh(geometry, material);
            currentPokemonMesh.position.set(0, 4, 0);
            scene.add(currentPokemonMesh);

            // Hiển thị info
            infoEl.innerHTML = `
                <div class="text-3xl font-bold">${data.name.toUpperCase()}</div>
                <div class="text-xl">HP: ${data.stats[0].base_stat} | ATK: ${data.stats[1].base_stat}</div>
                <div class="text-lg mt-2">Type: ${data.types.map(t => t.type.name).join(', ')}</div>
            `;
            infoEl.classList.remove('hidden');
            catchBtn.classList.remove('hidden');

            log("Một con " + data.name.toUpperCase() + " xuất hiện!");
        }

        function tryCatch() {
            if (!currentPokemonData || balls <= 0) return;

            balls--;
            updateUI();

            // Xác suất bắt đơn giản (dựa HP)
            const catchChance = 0.7 - (currentPokemonData.stats[0].base_stat / 300);
            if (Math.random() < catchChance) {
                score += currentPokemonData.stats[1].base_stat * 3 + 100;
                updateUI();
                log(`<span class="text-green-400 text-2xl">BẮT THÀNH CÔNG!</span> +${currentPokemonData.stats[1].base_stat * 3 + 100} điểm!`);
                scene.remove(currentPokemonMesh);
                currentPokemonMesh = null;
                currentPokemonData = null;
                infoEl.classList.add('hidden');
                catchBtn.classList.add('hidden');
            } else {
                log(`<span class="text-red-400">Thất bại!</span> ${currentPokemonData.name.toUpperCase()} thoát mất...`);
            }

            if (balls <= 0) {
                log("<br><span class='text-yellow-400'>HẾT POKÉ BALL! CHƠI LẠI SAU NHA!</span>");
            }
        }

        function log(message) {
            const logEl = document.createElement('div');
            logEl.innerHTML = message;
            logEl.className = 'text-xl mt-4';
            document.getElementById('info').appendChild(logEl);
        }

        // Animation loop
        function animate() {
            requestAnimationFrame(animate);

            if (currentPokemonMesh) {
                currentPokemonMesh.rotation.y += 0.01;
            }

            renderer.render(scene, camera);
        }
        animate();

        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
